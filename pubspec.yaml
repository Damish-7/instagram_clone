name: instagram_clone
description: Instagram Clone with PHP/MySQL backend using GetX

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # HTTP Client
  dio: ^5.7.0

  # Image & Video
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.2

  # Stories
  story_view: ^0.16.6

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/